<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vest - 美股交易记录</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 12px; }
        
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #333; margin-bottom: 16px; font-size: 20px; }
        
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .header h1 { margin: 0; }
        
        .btn { background: #667eea; color: white; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #5568d3; }
        .btn-green { background: #11998e; }
        .btn-red { background: #eb3349; }
        .btn-sm { padding: 6px 10px; font-size: 12px; }
        
        /* Stats */
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
        .stat { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 8px; border-radius: 10px; text-align: center; }
        .stat.green { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .stat.red { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }
        .stat-value { font-size: 20px; font-weight: bold; }
        .stat-label { font-size: 11px; opacity: 0.9; margin-top: 2px; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; overflow-y: auto; }
        .modal.active { display: block; }
        .modal-content { background: white; margin: 20px auto; border-radius: 12px; padding: 20px; width: 95%; max-width: 500px; }
        .modal h2 { margin-bottom: 16px; font-size: 18px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; margin-bottom: 4px; font-size: 13px; color: #666; }
        .form-group input, .form-group select, .form-group textarea { 
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; 
        }
        .form-group textarea { min-height: 70px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        .btn-cancel { background: #999; }
        
        /* Table - Responsive */
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
        th { color: #666; font-weight: 500; font-size: 10px; text-transform: uppercase; white-space: nowrap; }
        
        .symbol { font-weight: 600; color: #333; font-size: 14px; }
        .side { padding: 3px 8px; border-radius: 4px; font-size: 11px; display: inline-block; }
        .side.LONG { background: #e6f7ff; color: #1890ff; }
        .side.SHORT { background: #fff1f0; color: #ff4d4f; }
        .status { padding: 3px 8px; border-radius: 4px; font-size: 11px; }
        .status.PLANNING { background: #f5f5f5; color: #666; }
        .status.OPEN { background: #fff7e6; color: #fa8c16; }
        .status.CLOSED { background: #f6ffed; color: #52c41a; }
        .pnl { font-weight: 600; }
        .pnl.positive { color: #52c41a; }
        .pnl.negative { color: #ff4d4f; }
        
        .logic, .journal { max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; color: #666; }
        .action-btns { display: flex; gap: 4px; white-space: nowrap; }
        
        .empty { text-align: center; color: #999; padding: 30px; font-size: 14px; }
        
        /* Mobile Responsive */
        @media (max-width: 600px) {
            body { padding: 8px; }
            h1 { font-size: 18px; }
            .stats { grid-template-columns: 1fr; gap: 8px; }
            .stat { padding: 10px; }
            .stat-value { font-size: 18px; }
            .card { padding: 12px; margin-bottom: 8px; }
            .form-row { grid-template-columns: 1fr; }
            .modal-content { margin: 10px; padding: 16px; }
            table { min-width: 500px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 Vest 交易记录</h1>
            <button class="btn" onclick="openModal()">+ 新增</button>
        </div>
        
        <div class="stats" id="stats">
            <div class="stat">
                <div class="stat-value" id="totalTrades">-</div>
                <div class="stat-label">总交易</div>
            </div>
            <div class="stat green">
                <div class="stat-value" id="openPositions">-</div>
                <div class="stat-label">持仓</div>
            </div>
            <div class="stat" id="totalPnlStat">
                <div class="stat-value" id="totalPnl">-</div>
                <div class="stat-label">总盈亏</div>
            </div>
        </div>
        
        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>股票</th><th>方向</th><th>状态</th><th>买入逻辑</th><th>目标/止损</th>
                            <th>入场</th><th>出场</th><th>盈亏</th><th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tradeList"></tbody>
                </table>
            </div>
            <div class="empty" id="emptyState">暂无交易记录</div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="modalTitle">新增交易</h2>
            <form id="tradeForm">
                <input type="hidden" id="tradeId">
                <div class="form-group">
                    <label>股票代码 *</label>
                    <input type="text" id="symbol" placeholder="如 NVDA" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>方向</label>
                        <select id="side">
                            <option value="LONG">做多</option>
                            <option value="SHORT">做空</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>状态</label>
                        <select id="status">
                            <option value="PLANNING">计划中</option>
                            <option value="OPEN">持仓中</option>
                            <option value="CLOSED">已平仓</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>买入逻辑</label>
                    <textarea id="planBuyLogic" placeholder="为什么买入？你的交易逻辑..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>目标价</label>
                        <input type="number" step="0.01" id="targetPrice" placeholder="目标价">
                    </div>
                    <div class="form-group">
                        <label>止损价</label>
                        <input type="number" step="0.01" id="stopLoss" placeholder="止损价">
                    </div>
                </div>
                <div class="form-row" id="execFields" style="display:none;">
                    <div class="form-group">
                        <label>入场价</label>
                        <input type="number" step="0.01" id="entryPrice" placeholder="入场价">
                    </div>
                    <div class="form-group">
                        <label>数量</label>
                        <input type="number" id="quantity" placeholder="股数">
                    </div>
                </div>
                <div class="form-row" id="closeFields" style="display:none;">
                    <div class="form-group">
                        <label>出场价</label>
                        <input type="number" step="0.01" id="exitPrice" placeholder="出场价">
                    </div>
                </div>
                <div class="form-group" id="journalGroup" style="display:none;">
                    <label>复盘内容</label>
                    <textarea id="journalContent" placeholder="这笔交易做得如何？有什么教训？"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-cancel" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API = 'http://' + window.location.hostname + '/api';
        
        function openModal(trade = null) {
            const modal = document.getElementById('modal');
            const form = document.getElementById('tradeForm');
            const title = document.getElementById('modalTitle');
            
            if (trade) {
                title.textContent = '编辑交易';
                document.getElementById('tradeId').value = trade.id;
                document.getElementById('symbol').value = trade.symbol;
                document.getElementById('side').value = trade.side;
                document.getElementById('status').value = trade.status;
                document.getElementById('planBuyLogic').value = trade.plan_buy_logic || '';
                document.getElementById('targetPrice').value = trade.target_price || '';
                document.getElementById('stopLoss').value = trade.stop_loss || '';
                document.getElementById('entryPrice').value = trade.entry_price || '';
                document.getElementById('quantity').value = trade.quantity || '';
                document.getElementById('exitPrice').value = trade.exit_price || '';
            } else {
                title.textContent = '新增交易';
                form.reset();
                document.getElementById('tradeId').value = '';
            }
            
            updateFieldsVisibility();
            modal.classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }
        
        function updateFieldsVisibility() {
            const status = document.getElementById('status').value;
            document.getElementById('execFields').style.display = (status === 'OPEN' || status === 'CLOSED') ? 'grid' : 'none';
            document.getElementById('closeFields').style.display = status === 'CLOSED' ? 'grid' : 'none';
            document.getElementById('journalGroup').style.display = status === 'CLOSED' ? 'block' : 'none';
        }
        
        document.getElementById('status').addEventListener('change', updateFieldsVisibility);
        
        document.getElementById('tradeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const tradeId = document.getElementById('tradeId').value;
            const data = {
                symbol: document.getElementById('symbol').value.toUpperCase(),
                side: document.getElementById('side').value,
                status: document.getElementById('status').value,
                plan_buy_logic: document.getElementById('planBuyLogic').value,
                target_price: parseFloat(document.getElementById('targetPrice').value) || null,
                stop_loss: parseFloat(document.getElementById('stopLoss').value) || null,
                entry_price: parseFloat(document.getElementById('entryPrice').value) || null,
                quantity: parseInt(document.getElementById('quantity').value) || null,
                exit_price: parseFloat(document.getElementById('exitPrice').value) || null,
                journal_content: document.getElementById('journalContent').value
            };
            
            const url = tradeId ? API + '/trades/' + tradeId : API + '/trades';
            const method = tradeId ? 'PUT' : 'POST';
            
            const res = await fetch(url, {
                method: method,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            if (res.ok) {
                closeModal();
                loadData();
            }
        });
        
        async function deleteTrade(id) {
            if (!confirm('确定删除？')) return;
            await fetch(API + '/trades/' + id, {method: 'DELETE'});
            loadData();
        }
        
        async function loadData() {
            try {
                const [tradesRes, statsRes] = await Promise.all([
                    fetch(API + '/trades'),
                    fetch(API + '/stats')
                ]);
                
                const trades = await tradesRes.json();
                const stats = await statsRes.json();
                
                document.getElementById('totalTrades').textContent = stats.stats.reduce((s, r) => s + r.total, 0);
                document.getElementById('openPositions').textContent = stats.stats.reduce((s, r) => s + r.open_pos, 0);
                
                const totalPnl = stats.stats.reduce((s, r) => s + (r.total_pnl || 0), 0);
                document.getElementById('totalPnl').textContent = '$' + totalPnl.toFixed(0);
                document.getElementById('totalPnlStat').className = totalPnl >= 0 ? 'stat green' : 'stat red';
                
                const tbody = document.getElementById('tradeList');
                tbody.innerHTML = '';
                
                if (trades.trades.length === 0) {
                    document.getElementById('emptyState').style.display = 'block';
                } else {
                    document.getElementById('emptyState').style.display = 'none';
                    trades.trades.forEach(trade => {
                        const pnl = trade.net_pnl ? (trade.net_pnl >= 0 ? '+' : '') + '$' + trade.net_pnl.toFixed(0) : '-';
                        const pnlClass = trade.net_pnl > 0 ? 'positive' : (trade.net_pnl < 0 ? 'negative' : '');
                        const targetStop = [trade.target_price ? '目标:' + trade.target_price : '', trade.stop_loss ? '损:' + trade.stop_loss : ''].filter(Boolean).join(' ');
                        
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td class="symbol">$${trade.symbol}</td>
                            <td><span class="side ${trade.side}">${trade.side === 'LONG' ? '多' : '空'}</span></td>
                            <td><span class="status ${trade.status}">${trade.status === 'PLANNING' ? '计划' : trade.status === 'OPEN' ? '持仓' : '平仓'}</span></td>
                            <td class="logic" title="${trade.plan_buy_logic || ''}">${trade.plan_buy_logic || '-'}</td>
                            <td style="font-size:11px;">${targetStop || '-'}</td>
                            <td>${trade.entry_price ? '$' + trade.entry_price : '-'}</td>
                            <td>${trade.exit_price ? '$' + trade.exit_price : '-'}</td>
                            <td class="pnl ${pnlClass}">${pnl}</td>
                            <td class="action-btns">
                                <button class="btn btn-sm" onclick='openModal(${JSON.stringify(trade).replace(/'/g, "&#39;")})'>编辑</button>
                                <button class="btn btn-sm btn-red" onclick="deleteTrade(${trade.id})">删</button>
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        loadData();
        setInterval(loadData, 10000);
    </script>
</body>
</html>
